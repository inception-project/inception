<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <form wicket:id="form">
        <div class="form-group">
            <label>
                <input type="checkbox" wicket:id="enabled" />
                <strong>Enable Hyperlink Mode</strong>
            </label>
            <small class="form-text text-muted">
                When enabled, this feature will show text and URL input fields instead of a single text field.
            </small>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" wicket:id="requireProtocol" />
                Require protocol (http:// or https://)
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" wicket:id="allowRelativeUrls" />
                Allow relative URLs
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" wicket:id="openInNewTab" />
                Open links in new tab
            </label>
        </div>
    </form>
</wicket:panel>

</html>
