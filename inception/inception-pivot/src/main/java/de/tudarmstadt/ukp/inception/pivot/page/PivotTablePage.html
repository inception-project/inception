<html xmlns:wicket="http://wicket.apache.org">
<body>
  <wicket:extend>
    <div class="d-flex flex-column flex-grow-1 overflow-hidden">
    <ul wicket:id="tabStrip" class="nav nav-tabs flex-shrink-0 px-2 pt-2"
        style="position: relative; z-index: 5;">
      <li wicket:id="reportTabs" class="nav-item">
        <a wicket:id="select" class="nav-link d-flex align-items-center" href="#">
          <i wicket:id="selectDirty" class="fa-solid fa-circle text-warning me-2"
             style="font-size: 0.5em;" title="Unsaved changes"></i>
          <span wicket:id="selectName">Untitled</span>
        </a>
        <span wicket:id="active" class="nav-link active dropdown d-inline-flex align-items-center">
          <i wicket:id="dirty" class="fa-solid fa-circle text-warning me-2"
             style="font-size: 0.5em;" title="Unsaved changes"></i>
          <span wicket:id="title" style="min-width: 3em;" title="Click to rename"/>
          <a class="ms-2 text-body-secondary" href="#" role="button" data-bs-toggle="dropdown"
             data-bs-config='{"popperConfig":{"strategy":"fixed"}}' aria-expanded="false"
             aria-label="Report menu">
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </a>
          <div wicket:id="menu" class="dropdown-menu dropdown-menu-end p-2" style="min-width: 12rem;">
            <a wicket:id="duplicate" class="dropdown-item" href="#">
              <i class="fa-solid fa-copy me-2"></i>Duplicate
            </a>
            <a wicket:id="delete" class="dropdown-item text-danger" href="#">
              <i class="fa-solid fa-trash me-2"></i>Delete
            </a>
          </div>
        </span>
      </li>
      <li class="nav-item">
        <a wicket:id="addTab" class="nav-link" href="#" title="New report">
          <i class="fa-solid fa-plus"></i>
        </a>
      </li>
    </ul>
    <div class="flex-content flex-h-container overflow-hidden">
      <div class="flex-sidebar flex-v-container p-2">
        <form wicket:id="sidebar" class="flex-content flex-v-container">
          <div class="flex-content scrolling pe-2">
            <div class="mb-2 mt-2">
              <i class="fa-solid fa-table me-2"></i>Structure
            </div>
            <div class="form-row form-floating mb-3" wicket:enclosure="aggregator">
              <select wicket:id="aggregator" class="form-select" />
              <label wicket:for="aggregator">
                <wicket:label key="aggregator" />
              </label>
            </div>
            <div class="card mb-2">
              <div class="card-header d-flex justify-content-between align-items-center"
                   style="font-size: 85%">
                <span>Rows</span>
                <span wicket:id="rowPicker"></span>
              </div>
              <ol class="card-body list-group list-group-flush p-0">
                <li wicket:id="noRowExtractors" class="list-group-item text-muted">
                  <small>No rows yet</small>
                </li>
                <li wicket:id="rowExtractors" class="list-group-item">
                  <a wicket:id="remove" class="float-end text-body-secondary" title="Remove" aria-label="Remove">
                    <i class="fa-solid fa-xmark"></i>
                  </a>
                  <span wicket:id="name" />
                  <small wicket:id="layer" class="text-body-secondary ms-1" />
                </li>
              </ol>
            </div>
            <div class="position-relative">
              <button wicket:id="switchRowsCols" class="btn btn-sm btn-outline-secondary py-0 position-absolute" style="z-index: 1; left: 50%; transform: translateX(-50%); top: -1rem; --bs-btn-bg: var(--bs-body-bg);">
                <i class="fa-solid fa-arrows-rotate me-2"></i>Flip
              </button>
              <div class="card mb-2">
                <div class="card-header d-flex justify-content-between align-items-center"
                     style="font-size: 85%">
                  <span>Columns</span>
                  <span wicket:id="colPicker"></span>
                </div>
                <ol class="card-body list-group list-group-flush p-0">
                  <li wicket:id="noColExtractors" class="list-group-item text-muted">
                    <small>No columns yet</small>
                  </li>
                  <li wicket:id="colExtractors" class="list-group-item">
                    <a wicket:id="remove" class="float-end text-body-secondary" title="Remove" aria-label="Remove">
                      <i class="fa-solid fa-xmark"></i>
                    </a>
                    <span wicket:id="name" />
                    <small wicket:id="layer" class="text-body-secondary ms-1" />
                  </li>
                </ol>
              </div>
            </div>
            <div wicket:id="cellExtractorsContainer" class="position-relative">
              <button wicket:id="switchColsCells" class="btn btn-sm btn-outline-secondary py-0 position-absolute" style="z-index: 1; left: 50%; transform: translateX(-50%); top: -1rem; --bs-btn-bg: var(--bs-body-bg);">
                <i class="fa-solid fa-arrows-rotate me-2"></i>Flip
              </button>
              <div class="card mb-2">
                <div class="card-header d-flex justify-content-between align-items-center"
                     style="font-size: 85%">
                  <span>Cells</span>
                  <span wicket:id="cellPicker"></span>
                </div>
                <ol class="card-body list-group list-group-flush p-0">
                  <li wicket:id="noCellExtractors" class="list-group-item text-muted">
                    <small>No cells yet</small>
                  </li>
                  <li wicket:id="cellExtractors" class="list-group-item">
                    <a wicket:id="remove" class="float-end text-body-secondary" title="Remove" aria-label="Remove">
                      <i class="fa-solid fa-xmark"></i>
                    </a>
                    <span wicket:id="name" />
                    <small wicket:id="layer" class="text-body-secondary ms-1" />
                  </li>
                </ol>
              </div>
            </div>
            <div class="mb-2">
              <i class="fa-solid fa-filter me-2"></i>Filters
            </div>
            <div class="flex-fill d-flex flex-column">
              <div class="d-flex flex-column flex-grow-1 form-row form-floating overflow-hidden rounded border">
                <select wicket:id="annotators" class="form-select flex-grow-1 border-0" style="min-height: 10em;"/>
                <label wicket:for="annotators"><wicket:label key="annotators"/></label>
              </div>
              <div class="d-flex flex-column flex-grow-1 form-row form-floating overflow-hidden rounded border">
                <select wicket:id="documents" class="form-select flex-grow-1 border-0" style="min-height: 10em;"/>
                <label wicket:for="documents"><wicket:label key="documents"/></label>
              </div>
            </div>
          </div>
          <div class="d-flex gap-2 mt-2">
            <button wicket:id="save" class="btn btn-outline-primary flex-fill">
              <i class="fa-solid fa-floppy-disk me-2"></i>Save
            </button>
            <button wicket:id="run" class="btn btn-primary flex-fill">
              <i class="fa-solid fa-person-running me-2"></i>Run
            </button>
          </div>
        </form>
      </div>
      <div wicket:id="pivotTable" class="flex-content flex-v-container overflow-hidden"/>
     </div>
    </div>
  </wicket:extend>
</body>

</html>
